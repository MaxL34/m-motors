{% extends "shared/base.html" %}

{% block title %}Espace Admin — M-Motors{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-gray-900 rounded-xl flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/>
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-900">Espace administrateur</h1>
                <p class="text-xs text-gray-400">Accès réservé</p>
            </div>
        </div>

        {% if error %}
        <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 text-red-700 text-sm">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login" class="flex flex-col gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Adresse e-mail</label>
                <input type="email" name="email" value="{{ form_email or '' }}" required autocomplete="email"
                       class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:border-gray-800 focus:ring-1 focus:ring-gray-800 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                <input type="password" name="password" required autocomplete="current-password"
                       class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:border-gray-800 focus:ring-1 focus:ring-gray-800 outline-none">
            </div>
            <button type="submit"
                    class="w-full bg-gray-900 hover:bg-gray-800 text-white font-semibold py-2.5 rounded-lg transition-colors mt-2">
                Accéder à l'espace admin
            </button>
        </form>

        <p class="text-sm text-center mt-6">
            <a href="/" class="text-gray-400 hover:text-gray-600 transition-colors">← Retour au site</a>
        </p>
    </div>
</div>
{% endblock %}
