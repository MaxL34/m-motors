{% extends "shared/base.html" %}

{% block title %}Connexion — M-Motors{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

        <h1 class="text-2xl font-bold text-gray-900 mb-1">Connexion</h1>
        <p class="text-sm text-gray-500 mb-6">Accédez à votre espace M-Motors.</p>

        <form method="post" action="/login" class="flex flex-col gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Adresse e-mail</label>
                <input type="email" name="email" required autocomplete="email"
                       class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                <input type="password" name="password" required autocomplete="current-password"
                       class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors mt-2">
                Se connecter
            </button>
        </form>

        <p class="text-sm text-gray-500 text-center mt-6">
            Pas encore de compte ?
            <a href="/register" class="text-blue-600 hover:text-blue-800 font-medium">Créer un compte</a>
        </p>
    </div>
</div>
{% endblock %}
