<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}M-Motors{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="/" class="text-2xl font-bold text-gray-900 tracking-tight">M-Motors</a>
            <nav class="flex items-center gap-4 text-sm font-medium">
                <a href="/vehicles" class="text-gray-600 hover:text-gray-900 transition-colors">Catalogue</a>
                {% if current_user %}
                <span class="text-gray-500">Bonjour, {{ current_user.first_name }}</span>
                <a href="/logout" class="text-gray-600 hover:text-gray-900 transition-colors">Se déconnecter</a>
                {% else %}
                <a href="/register" class="text-gray-600 hover:text-gray-900 transition-colors">Créer un compte</a>
                <a href="/login"
                   class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                    Se connecter
                </a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-4 text-center text-sm text-gray-400">
            &copy; 2025 M-Motors
        </div>
    </footer>

</body>
</html>
